<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex" />
    <title>Form registration</title>
  </head>
  <body>
    <!--
      Netlify Forms registration only. This site is a client-rendered SPA, so
      Netlify cannot detect the real forms in the app bundle. These hidden
      static forms are parsed by Netlify at BUILD time to register the "contact"
      and "chatbot-lead" forms; the React components then submit to them by name
      via a urlencoded AJAX POST to /__forms.html. This page is never shown to
      users. Every field the app submits must be declared here or Netlify drops
      it. "bot-field" is the honeypot (netlify-honeypot).
    -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="interest" />
      <textarea name="message"></textarea>
      <input type="text" name="smsConsent" />
      <input type="text" name="referenceId" />
      <input type="text" name="pageUrl" />
      <input type="text" name="submittedAt" />
      <input type="text" name="language" />
      <input type="text" name="bot-field" />
    </form>

    <form name="chatbot-lead" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <textarea name="message"></textarea>
      <input type="text" name="smsConsent" />
      <input type="text" name="service" />
      <input type="text" name="referenceId" />
      <input type="text" name="pageUrl" />
      <input type="text" name="submittedAt" />
      <input type="text" name="language" />
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Rosalia Group | Real Estate &amp; Property Management — New Jersey</title>
    <meta name="description" content="Rosalia Group — New Jersey's trusted real estate and property management company. Apartment rentals, buying, selling, and full-service property management across Newark, Jersey City, East Orange, Elizabeth, and Orange." />
    <meta name="keywords" content="real estate New Jersey, Newark apartments, property management NJ, buy home NJ, sell home NJ, Jersey City rentals" />
    <!-- Google Fonts: Playfair Display + DM Sans + Space Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>

    <!-- forms-redeploy-marker: 3 (POST to /index.html to bypass SPA catch-all) -->
    <!--
      Netlify Forms detection (hidden, non-interactive). This is a client-rendered
      SPA, so Netlify's build parser can't see the real forms in the app bundle.
      These static forms live in index.html (always parsed at build) so Netlify
      registers "contact" and "chatbot-lead"; the React components submit to them
      by name via AJAX. Every field the app sends is declared here or Netlify
      drops it. "bot-field" is the honeypot.
    -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" style="display:none" aria-hidden="true">
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="interest" />
      <textarea name="message"></textarea>
      <input type="text" name="smsConsent" />
      <input type="text" name="referenceId" />
      <input type="text" name="pageUrl" />
      <input type="text" name="submittedAt" />
      <input type="text" name="language" />
      <input type="text" name="bot-field" />
    </form>
    <form name="chatbot-lead" data-netlify="true" netlify-honeypot="bot-field" style="display:none" aria-hidden="true">
      <input type="hidden" name="form-name" value="chatbot-lead" />
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <textarea name="message"></textarea>
      <input type="text" name="smsConsent" />
      <input type="text" name="service" />
      <input type="text" name="referenceId" />
      <input type="text" name="pageUrl" />
      <input type="text" name="submittedAt" />
      <input type="text" name="language" />
      <input type="text" name="bot-field" />
    </form>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
